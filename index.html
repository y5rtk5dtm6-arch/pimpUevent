<style> 
:root{
  color-scheme: dark;
  --bg:#12151A; --panel:#1B1F26; --panel-alt:#242A34; --panel-raise:#2A313D; --border:#313846; --border-soft:#262C37;
  --text:#EDEFF2; --text-dim:#95A0AD; --text-faint:#5B6472;
  --accent:#F2A93B; --accent-dim:#C98A2B; --accent-soft:rgba(242,169,59,.13); --accent-glow:rgba(242,169,59,.35);
  --green:#43C463; --green-soft:rgba(67,196,99,.14);
  --red:#F0584D; --red-soft:rgba(240,88,77,.14);
  --blue:#5AB0F2; --blue-soft:rgba(90,176,242,.14);
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;

  --shadow-md:0 8px 24px rgba(0,0,0,.35);
  --shadow-lg:0 20px 48px rgba(0,0,0,.5);
}
*{box-sizing:border-box;}
::selection{background:var(--accent-glow);}
.app{background:
    radial-gradient(circle at 15% 0%, rgba(242,169,59,.06), transparent 45%),
    var(--bg);
  color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}
.app *{transition:background .15s,border-color .15s,transform .1s ease,opacity .15s,box-shadow .15s;}

.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:34px;height:34px;border-radius:9px;object-fit:cover;flex-shrink:0;box-shadow:0 3px 10px rgba(0,0,0,.4);}
.brand-text b{display:block;font-size:14.5px;letter-spacing:.2px;}

.pill.dark{background:rgba(149,160,173,.16);color:var(--text-dim);}

.icon-btn:active{transform:scale(.93);}
.main{flex:1;padding:16px;padding-bottom:88px;max-width:980px;margin:0 auto;width:100%;}
.desktop-nav{display:none;}
.page-title{font-size:20px;font-weight:750;margin:2px 0 4px;letter-spacing:-.01em;}
.page-sub{color:var(--text-dim);font-size:12.5px;margin-bottom:16px;}
.grid{display:grid;gap:12px;}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}

input::placeholder,textarea::placeholder{color:var(--text-faint);}
select{cursor:pointer;}

.avail-ok{color:var(--green);}

.dow{text-align:center;font-size:10px;color:var(--text-faint);text-transform:uppercase;}
.search-wrap{position:relative;margin-bottom:12px;}
.subtabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.subtab{background:var(--panel-alt);border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:100px;font-size:12px;cursor:pointer;font-weight:600;}
.subtab.active{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-dim);}
a{color:var(--accent);text-decoration:none;}
</style>

// ---------- CSV ENGINE ----------
function normHeader(h){
  return (h||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]/g,'');
}
function detectDelimiter(line){
  const semi=(line.match(/;/g)||[]).length, comma=(line.match(/,/g)||[]).length;
  return semi>comma? ';' : ',';
}
function parseCSV(text){
  text = text.replace(/^\uFEFF/,''); // strip BOM
  const delim = detectDelimiter((text.split(/\r?\n/)[0])||',');
  const rows=[]; let row=[]; let field=''; let inQuotes=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQuotes){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQuotes=false; }
      else field+=c;
    } else {
      if(c==='"') inQuotes=true;
      else if(c===delim){ row.push(field); field=''; }
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c==='\r'){ /* skip */ }
      else field+=c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  const cleaned = rows.filter(r=>r.some(f=>f.trim()!==''));
  if(cleaned.length===0) return {headers:[],rows:[]};
  const headers = cleaned[0].map(h=>h.trim());
  return {headers, rows:cleaned.slice(1)};
}
function mapRow(headers,row,aliasMap){
  const normed = headers.map(normHeader);
  const out={};
  Object.keys(aliasMap).forEach(field=>{
    const aliases = aliasMap[field];
    let idx=-1;
    for(const al of aliases){ idx=normed.indexOf(al); if(idx!==-1) break; }
    out[field] = idx!==-1 ? (row[idx]||'').trim() : '';
  });
  return out;
}
function parseNumberFr(s){ if(!s) return ''; const n=parseFloat(s.toString().replace(/\s/g,'').replace(',','.')); return isNaN(n)? '' : n; }
function parseDateFlexible(s){
  if(!s) return '';
  s=s.trim();
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return `${m[1]}-${m[2]}-${m[3]}`;
  m = s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})/);
  if(m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  return '';
}
function csvEscapeField(v){
  v=(v===null||v===undefined)? '' : v.toString();
  if(/[;,"\n]/.test(v)) return '"'+v.replace(/"/g,'""')+'"';
  return v;
}
function toCSV(headers,rows){
  const lines=[headers.map(csvEscapeField).join(';')];
  rows.forEach(r=> lines.push(r.map(csvEscapeField).join(';')));
  return '\uFEFF'+lines.join('\r\n');
}
function downloadTextFile(filename,content,mime){
  const blob=new Blob([content],{type:mime||'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

// ---------- STORAGE ----------
// Fonctionne dans Claude (window.storage, partagé entre utilisateurs) ET en dehors
// (hébergement classique : GitHub Pages, etc.) grâce à un repli automatique sur localStorage.
const LS_PREFIX='pu_';
function hasClaudeStorage(){ return typeof window.storage!=='undefined' && window.storage && typeof window.storage.get==='function'; }
async function safeGet(key,def){
  if(hasClaudeStorage()){
    try{ const r=await window.storage.get(key,true); if(r) return JSON.parse(r.value); }
    catch(e){ /* on retente via localStorage ci-dessous */ }
  }
  try{ const v=localStorage.getItem(LS_PREFIX+key); return v!==null? JSON.parse(v) : def; }
  catch(e){ return def; }
}
async function saveKey(key,val){
  let savedRemote=false;
  if(hasClaudeStorage()){
    try{ await window.storage.set(key, JSON.stringify(val), true); savedRemote=true; }catch(e){ /* repli local */ }
  }
  try{ localStorage.setItem(LS_PREFIX+key, JSON.stringify(val)); }
  catch(e){ if(!savedRemote) console.error('storage save failed',key,e); }
}
async function loadAll(){
  const [cat,fac,sv,res,usr,cli,sor,ret,prop,curUser] = await Promise.all([
    safeGet('catalog', null), safeGet('factures', DEFAULT_FACTURES),
    safeGet('sav', DEFAULT_SAV), safeGet('reservations', DEFAULT_RESERVATIONS),
    safeGet('users', DEFAULT_USERS), safeGet('clients', DEFAULT_CLIENTS),
    safeGet('sorties', DEFAULT_SORTIES), safeGet('retours', DEFAULT_RETOURS),
    safeGet('proprietaires', DEFAULT_PROPRIETAIRES),
    safeGetPersonal('currentUser', null)
  ]);
  state.catalog = cat || DEFAULT_CATALOG;
  state.factures = fac; state.sav = sv; state.reservations = res;
  state.users = usr && usr.length ? usr : DEFAULT_USERS;
  state.clients = cli; state.sorties = sor; state.retours = ret;
  state.proprietaires = prop && prop.length ? prop : DEFAULT_PROPRIETAIRES;
  state.currentUserId = curUser || (state.users[0] && state.users[0].id) || null;
  migrateCatalog();
  render();
}
// Migration non-destructive : complète les nouveaux champs (codeScan, numéro d'inventaire,
// propriétaire) sur les articles créés avant cette évolution, sans jamais toucher aux données existantes.
function migrateCatalog(){
  let changed=false;
  if(!state.catalog.scanCounter){
    let max=0;
    state.catalog.articles.forEach(a=>{ if(a.codeScan){ const n=parseInt(a.codeScan.replace('PU',''),10); if(!isNaN(n)&&n>max) max=n; } });
    state.catalog.scanCounter=max; changed=true;
  }
  scanCounter=state.catalog.scanCounter;
  const defaultOwner = state.proprietaires[0] ? state.proprietaires[0].id : null;
  state.catalog.articles.forEach((a,i)=>{
    if(!a.codeScan){ scanCounter++; a.codeScan=nextScanCodeRaw(); changed=true; }
    if(a.numeroInventaire===undefined){ a.numeroInventaire=String(i+1).padStart(3,'0'); changed=true; }
    if(a.proprietaireId===undefined){ a.proprietaireId=defaultOwner; changed=true; }
  });
  state.catalog.scanCounter=scanCounter;
  if(changed) persistCatalog();
}
function nextScanCodeRaw(){ return 'PU'+String(scanCounter).padStart(8,'0'); }
function persistCatalog(){ saveKey('catalog', state.catalog); }
function persistFactures(){ saveKey('factures', state.factures); }
function persistSav(){ saveKey('sav', state.sav); }
function persistReservations(){ saveKey('reservations', state.reservations); }
function persistUsers(){ saveKey('users', state.users); }
function persistClients(){ saveKey('clients', state.clients); }
function persistSorties(){ saveKey('sorties', state.sorties); }
function persistRetours(){ saveKey('retours', state.retours); }
function persistProprietaires(){ saveKey('proprietaires', state.proprietaires); }
async function safeGetPersonal(key,def){
  if(hasClaudeStorage()){
    try{ const r=await window.storage.get(key,false); if(r) return JSON.parse(r.value); }
    catch(e){ /* repli local */ }
  }
  try{ const v=localStorage.getItem(LS_PREFIX+'p_'+key); return v!==null? JSON.parse(v) : def; }
  catch(e){ return def; }
}
function persistCurrentUser(){
  if(hasClaudeStorage()){ try{ window.storage.set('currentUser', JSON.stringify(state.currentUserId), false); }catch(e){} }
  try{ localStorage.setItem(LS_PREFIX+'p_currentUser', JSON.stringify(state.currentUserId)); }catch(e){}
}

function rangesOverlap(s1,e1,s2,e2){ return s1<=e2 && s2<=e1; }
function isReservedInRange(articleId,start,end,excludeId){
  return state.reservations.some(r=> r.id!==excludeId && r.statut!=='Annulée' && r.statut!=='Restituée' && r.articleIds.includes(articleId) && rangesOverlap(r.dateDebut,r.dateFin,start,end));

function userInitials(id){ const u=findUser(id); if(!u) return '?'; return ((u.prenom[0]||'')+(u.nom[0]||'')).toUpperCase(); }
function findClient(id){ return state.clients.find(c=>c.id===id); }
function clientLabel(c){ if(!c) return '—'; return c.societe? c.societe+' — '+c.prenom+' '+c.nom : (c.prenom+' '+c.nom); }
function reservationLabel(r){
  const parts=[];
  if(r.clientId){ const c=findClient(r.clientId); if(c) parts.push(clientLabel(c)); }
  if(r.lieu) parts.push(r.lieu);
  if(parts.length) return parts.join(' — ');
  if(r.client) return r.client; // compatibilité avec les réservations créées avant l'ajout du champ lieu
  return 'Sans client ni lieu';

function pseudoBarcode(code){
  let bars='', x=0;
  for(let i=0;i<code.length;i++){
    const c=code.charCodeAt(i); const w=2+(c%4);
    if(i%2===0) bars+=`<rect x="${x}" y="0" width="${w}" height="40"/>`;
    x+=w+1;
  }
  return `<svg class="barcode-svg" viewBox="0 0 ${x} 40" preserveAspectRatio="none" fill="var(--text)">${bars}</svg>`;
}
function statusPill(loc){
  const k=locKind(loc);
  if(k==='depot') return `<span class="pill green">En stock</span>`;
  if(k==='camion') return `<span class="pill amber">${esc(locName(loc))}</span>`;
  if(k==='sav') return `<span class="pill red">SAV</span>`;
  return `<span class="pill gray">?</span>`;
}

function resizeImage(file,maxW=480,quality=0.6){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const scale=Math.min(1,maxW/img.width);
        const c=document.createElement('canvas');
        c.width=Math.round(img.width*scale); c.height=Math.round(img.height*scale);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        resolve(c.toDataURL('image/jpeg',quality));
      };
      img.onerror=reject; img.src=e.target.result;
    };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}

App.processCode=(code)=>{
  const a=findArticleByScan(code);
  if(!a){ state.scanMsg={ok:false,text:'Code inconnu : '+code}; render(); focusScan(); return; }
  if(state.chargeMode==='sortie'){
    if(!state.chargeTarget){ state.scanMsg={ok:false,text:"Sélectionnez d'abord un camion cible."}; render(); focusScan(); return; }
    if(locKind(a.emplacement)==='camion'){ state.scanMsg={ok:false,text:a.nom+' est déjà sur '+locName(a.emplacement)}; render(); focusScan(); return; }
    const from=locName(a.emplacement);
    a.emplacement=state.chargeTarget;
    a.historique.unshift({date:todayISO(),type:'Sortie',detail:'Chargé sur '+locName(state.chargeTarget)+' (depuis '+from+')'});
    persistCatalog();
    state.scanMsg={ok:true,text:'✓ '+a.nom+' → '+locName(state.chargeTarget)};
  } else {
    if(locKind(a.emplacement)!=='camion'){ state.scanMsg={ok:false,text:a.nom+" n'est pas sur un camion actuellement."}; render(); focusScan(); return; }
    const from=locName(a.emplacement);
    a.emplacement=a.depotDomicile;
    a.historique.unshift({date:todayISO(),type:'Retour',detail:'Retour au dépôt '+locName(a.depotDomicile)+' (depuis '+from+')'});
    persistCatalog();
    state.scanMsg={ok:true,text:'✓ '+a.nom+' → '+locName(a.depotDomicile)+' (stock)'};
  }
  render(); focusScan();
};

        id:uid(), code:codeArticle, codeScan, numeroInventaire:(m.numeroInventaire||'').trim()||'001', proprietaireId: owner? owner.id : null,
        nom:m.nom, marque:m.marque||'', categorie:m.categorie||'Divers',
        emplacement:depotId, depotDomicile:depotId, dateAchat, prixAchat, factureId:null,
        etat:m.etat||'Bon état', notes:m.notes||'', photos:[], sortieActuelleId:null,
        historique:[{date:todayISO(),type:'Import',detail:'Importé depuis un fichier CSV — code de scan '+codeScan}]
      });
      added++;
    });
    persistCatalog();
  } else if(type==='clients'){
    data.mapped.forEach(m=>{
      if(!m.nom && !m.societe){ skipped++; return; }
      const commercial = state.users.find(u=>(u.prenom+' '+u.nom).toLowerCase()===(m.commercial||'').toLowerCase());
      state.clients.push({
        id:uid(), societe:m.societe||'', prenom:m.prenom||'', nom:m.nom||'', adresse:m.adresse||'',
        codePostal:m.codePostal||'', ville:m.ville||'', pays:m.pays||'France', telephone:m.telephone||'',
        email:m.email||'', siret:m.siret||'', tva:m.tva||'', observations:m.observations||'',
        commercialId: commercial? commercial.id : state.currentUserId
      });
      added++;
    });
    persistClients();
  } else if(type==='factures'){
    data.mapped.forEach(m=>{
      if(!m.numero){ skipped++; return; }
      state.factures.push({ id:uid(), numero:m.numero, fournisseur:m.fournisseur||'', date:parseDateFlexible(m.date)||todayISO(), montant:parseNumberFr(m.montant), notes:m.notes||'' });
      added++;
    });
    persistFactures();
  }
  state.importData=null; App.closeModal();
  showToast(added+' ligne(s) importée(s)'+(skipped? ', '+skipped+' ignorée(s) (champ requis manquant)':'')); render();
};
App.cancelImport=()=>{ state.importData=null; App.closeModal(); };
App.exportCSV=(type)=>{

App.openNewReservation=(dateSel)=>App.openModal('newreservation',{date:dateSel});
App.createReservation=(e)=>{
  e.preventDefault(); const f=e.target;
  const checked=[...f.querySelectorAll('input[type=checkbox]:checked')].map(c=>c.value);
  if(checked.length===0){ alert('Sélectionnez au moins un article.'); return; }
  const clientId=f.clientId.value||null;

  if(!clientId && !lieu){ alert("Indiquez au moins un lieu (où part le matériel) ou un client."); return; }
  const r={id:uid(),clientId,lieu,creePar:state.currentUserId,
    dateDebut:f.dateDebut.value,dateFin:f.dateFin.value,articleIds:checked,statut:'En attente',
    montant:f.montant.value||'',notes:f.notes.value};
  state.reservations.push(r); persistReservations(); App.closeModal(); showToast('Blocage créé : '+reservationLabel(r)); render();

App.setReservationStatus=(id,statut)=>{
  const r=state.reservations.find(x=>x.id===id); if(!r) return;
  if(statut==='Livrée'){ App.openModal('confirmSortie',{reservationId:id}); return; }
  if(statut==='Restituée'){ App.openModal('confirmRetour',{reservationId:id}); return; }
  r.statut=statut; persistReservations(); render();
};
App.confirmSortie=(e)=>{
  e.preventDefault(); const f=e.target;
  const r=state.reservations.find(x=>x.id===f.reservationId.value); if(!r) return;
  const now=new Date();
  const sortie={id:uid(),reservationId:r.id,clientId:r.clientId,lieu:r.lieu||'',utilisateurSortieId:state.currentUserId,
    dateSortie:todayISO(),heureSortie:now.toTimeString().slice(0,5),signature:f.signature.value||'',commentaire:f.commentaire.value||''};
  state.sorties.push(sortie);
  r.articleIds.forEach(aid=>{ const a=findArticle(aid); if(!a) return; a.sortieActuelleId=sortie.id;
    a.historique.unshift({date:todayISO(),type:'Sortie',detail:'Parti pour '+reservationLabel(r)+' — sorti par '+userLabel(state.currentUserId)+' à '+sortie.heureSortie}); });
  r.statut='Livrée'; persistSorties(); persistCatalog(); persistReservations(); App.closeModal(); showToast('Matériel marqué comme parti'); render();
};
App.recalcRetourSummary=(form)=>{
  const groups={};
  form.querySelectorAll('.retour-line').forEach(line=>{
    const key=line.dataset.owner;
    const box=line.querySelector('input[type=checkbox]');
    if(!groups[key]) groups[key]={total:0,checked:0};
    groups[key].total++; if(box.checked) groups[key].checked++;
  });
  form.querySelectorAll('.owner-summary').forEach(el=>{
    const g=groups[el.dataset.owner]||{total:0,checked:0};
    if(g.checked===g.total){ el.textContent='✔ Tout est revenu'; el.style.color='var(--green)'; }
    else{ el.textContent='⚠ Il manque '+(g.total-g.checked)+' article(s)'; el.style.color='var(--red)'; }
  });
};
App.confirmRetour=(e)=>{
  e.preventDefault(); const f=e.target;
  const r=state.reservations.find(x=>x.id===f.reservationId.value); if(!r) return;
  const sortie=state.sorties.find(s=>s.reservationId===r.id);
  const now=new Date();
  const checked=[...f.querySelectorAll('input[type=checkbox]:checked')].map(c=>c.value);
  if(checked.length===0){ alert('Cochez au moins un article revenu.'); return; }
  const retour={id:uid(),sortieId:sortie?sortie.id:null,utilisateurRetourId:state.currentUserId,
    dateRetour:todayISO(),heureRetour:now.toTimeString().slice(0,5),articleIds:checked,commentaire:f.commentaire.value||''};
  state.retours.push(retour);
  checked.forEach(aid=>{ const a=findArticle(aid); if(!a) return; a.sortieActuelleId=null; a.emplacement=a.depotDomicile;
    a.historique.unshift({date:todayISO(),type:'Retour',detail:'Retour de '+reservationLabel(r)+' — par '+userLabel(state.currentUserId)+' à '+retour.heureRetour}); });
  const stillOut = r.articleIds.some(aid=>{ const a=findArticle(aid); return a && a.sortieActuelleId; });
  r.statut = stillOut? 'Livrée' : 'Restituée';
  persistRetours(); persistCatalog(); persistReservations(); App.closeModal();
  showToast(stillOut? 'Retour partiel enregistré — du matériel reste sorti' : 'Retour complet enregistré'); render();
};
App.cancelReservation=(id)=>{
  const r=state.reservations.find(x=>x.id===id); if(!r) return;
  r.statut='Annulée'; persistReservations(); render();
};
App.openReservationDetail=(id)=>App.openModal('reservationDetail',{id});
App.recalcAvailability=(form)=>{
  const start=form.dateDebut.value, end=form.dateFin.value;

  form.querySelectorAll('.checkline').forEach(line=>{
    const id=line.dataset.id; const reserved=isReservedInRange(id,start,end,null);

    if(badge){ badge.textContent=reserved?'Réservé':'Disponible'; badge.className='avail-badge '+(reserved?'avail-no':'avail-ok'); }

// -- Dashboard availability tool --
App.checkAvailability=(form)=>{
  const start=form.dateDebut.value, end=form.dateFin.value;
  const out=document.getElementById('avail-results');
  if(!start||!end||!out) return;
  const rows = state.catalog.articles.map(a=>{
    const reserved = isReservedInRange(a.id,start,end,null);
    const onSav = a.emplacement==='SAV';
    const chezClient = !!a.sortieActuelleId;
    const ok = !reserved && !onSav && !chezClient;
    return {a,ok,reason: onSav?'En SAV':(chezClient?'Chez un client':(reserved?'Réservé':''))};
  }).sort((x,y)=> (x.ok===y.ok? x.a.nom.localeCompare(y.a.nom) : (x.ok? -1:1)) );
  out.innerHTML = rows.map(r=>`
    <tr>
      <td class="mono">${esc(r.a.codeScan)}</td>
      <td>${esc(r.a.nom)}<div style="color:var(--text-dim);font-size:11px">${esc(r.a.categorie)} · ${ownerDot(r.a.proprietaireId)}</div></td>
      <td>${r.ok? '<span class="pill green">Disponible</span>' : '<span class="pill red">'+esc(r.reason)+'</span>'}</td>
    </tr>`).join('');
};

App.exportFullBackup=()=>{
  const backup={
    _type:'sauvegarde_parc_location', version:2, exportedAt:new Date().toISOString(),
    catalog:state.catalog, factures:state.factures, sav:state.sav, reservations:state.reservations,
    users:state.users, clients:state.clients, sorties:state.sorties, retours:state.retours, proprietaires:state.proprietaires
  };
  downloadTextFile('sauvegarde_parc_'+todayISO()+'.json', JSON.stringify(backup,null,2), 'application/json');
  showToast('Sauvegarde téléchargée');
};
App.openRestoreBackup=()=>{ state.restoreData=null; App.openModal('restore'); };
App.handleRestoreFile=async(inputEl)=>{
  const file=inputEl.files[0]; if(!file) return;
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    if(!data.catalog || !Array.isArray(data.catalog.articles)){ alert("Ce fichier ne ressemble pas à une sauvegarde valide de cette application."); return; }
    state.restoreData=data; render();
  }catch(e){ alert("Impossible de lire ce fichier (JSON invalide ou corrompu)."); }
};
App.confirmRestore=()=>{
  const data=state.restoreData; if(!data) return;
  if(!confirm("Cette action va REMPLACER toutes les données actuelles (stock, clients, réservations, etc.) par celles de cette sauvegarde. Continuer ?")) return;
  state.catalog = data.catalog || state.catalog;
  state.factures = data.factures || [];
  state.sav = data.sav || [];
  state.reservations = data.reservations || [];
  state.users = (data.users && data.users.length) ? data.users : state.users;
  state.clients = data.clients || [];
  state.sorties = data.sorties || [];
  state.retours = data.retours || [];
  state.proprietaires = (data.proprietaires && data.proprietaires.length) ? data.proprietaires : state.proprietaires;
  if(!state.users.find(u=>u.id===state.currentUserId)) state.currentUserId = state.users[0] ? state.users[0].id : null;
  migrateCatalog();
  persistCatalog(); persistFactures(); persistSav(); persistReservations();
  persistUsers(); persistClients(); persistSorties(); persistRetours(); persistProprietaires(); persistCurrentUser();
  state.restoreData=null; App.closeModal();
  showToast('Sauvegarde restaurée avec succès'); render();
};
App.cancelRestore=()=>{ state.restoreData=null; App.closeModal(); };

let _libsPromise=null;
function loadExternalScript(src){
  return new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src=src; s.async=true;
    const timer=setTimeout(()=>reject(new Error('timeout')), 7000);
    s.onload=()=>{ clearTimeout(timer); resolve(true); };
    s.onerror=()=>{ clearTimeout(timer); reject(new Error('load failed')); };
    document.head.appendChild(s);
  });
}
function ensureBarcodeLibs(){
  if(_libsPromise) return _libsPromise;
  _libsPromise = (async()=>{
    let jsbarcode=!!window.JsBarcode, qrcode=!!window.QRCode;
    if(!jsbarcode){ try{ await loadExternalScript('https://cdnjs.cloudflare.com/ajax/libs/JsBarcode/3.11.5/JsBarcode.all.min.js'); jsbarcode=!!window.JsBarcode; }catch(e){ jsbarcode=false; } }
    if(!qrcode){ try{ await loadExternalScript('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js'); qrcode=!!window.QRCode; }catch(e){ qrcode=false; } }
    return {jsbarcode,qrcode};
  })();
  return _libsPromise;
}
function renderBarcodeDataUrl(code){
  try{
    const canvas=document.createElement('canvas');
    window.JsBarcode(canvas, code, {format:'CODE128', height:34, width:1.6, fontSize:11, margin:4, background:'#ffffff'});
    return canvas.toDataURL('image/png');
  }catch(e){ console.error('barcode render error',e); return null; }
}
function articleDeepLink(codeScan){
  const base = location.href.split('#')[0].split('?')[0];
  return base+'#'+codeScan;
}
function renderQrDataUrl(code){
  try{
    const holder=document.createElement('div');
    holder.style.position='fixed'; holder.style.left='-9999px';
    document.body.appendChild(holder);
    new window.QRCode(holder, {text:articleDeepLink(code), width:220, height:220, correctLevel: window.QRCode.CorrectLevel.L});
    const img=holder.querySelector('img'); const canvas=holder.querySelector('canvas');
    let url=null;
    if(canvas) url=canvas.toDataURL('image/png');
    else if(img && img.src) url=img.src;
    document.body.removeChild(holder);
    return url;
  }catch(e){ console.error('qr render error',e); return null; }
}

  const ids = Object.keys(state.labelSelection).filter(id=>state.labelSelection[id]);

  const labelsHtml = arts.map(a=>{

  <div class="cal-grid" style="margin-bottom:6px">${dow.map(d=>`<div class="dow">${d}</div>`).join('')}</div>
  <div class="cal-grid">
    ${cells.map(d=>{
      if(!d) return `<div class="cal-day out"></div>`;
      const iso=isoOf(d);
      const resThatDay=state.reservations.filter(r=>r.statut!=='Annulée' && r.dateDebut<=iso && r.dateFin>=iso);
      const dotColor = resThatDay.length? (STATUT_DOT[resThatDay[0].statut]||'var(--accent)') : null;
      return `<div class="cal-day ${iso===t?'today':''}" onclick="App.calSelectDay('${iso}')"><div class="n">${d}</div>${dotColor? `<div class="cal-dot" style="background:${dotColor}"></div>`:''}</div>`;
    }).join('')}
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;font-size:11px;color:var(--text-dim)">
    ${STATUTS.map(s=>`<div style="display:flex;align-items:center;gap:5px"><span style="width:7px;height:7px;border-radius:50%;background:${STATUT_DOT[s]};display:inline-block"></span>${s}</div>`).join('')}
  </div>
  ${selDay? `
  <div class="section-title">${fmtDate(selDay)}</div>
  <div class="card">
    ${selRes.length? selRes.map(r=>{
      const next = r.statut==='En attente'?'Confirmée':(r.statut==='Confirmée'?'Livrée':(r.statut==='Livrée'?'Restituée':null));
      return `
      <div class="hist-item" style="align-items:flex-start">
        <div style="flex:1;cursor:pointer" onclick="App.openReservationDetail('${r.id}')">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><b>${esc(reservationLabel(r))}</b>${reservationPill(r.statut)}</div>
          <div style="color:var(--text-dim);margin-top:2px">${fmtDate(r.dateDebut)} → ${fmtDate(r.dateFin)} · ${r.articleIds.length} article(s) · créé par ${esc(userLabel(r.creePar))}</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
          ${next? `<button class="btn sm" onclick="App.setReservationStatus('${r.id}','${next}')">→ ${next}</button>`:''}
          ${r.statut!=='Annulée' && r.statut!=='Restituée'? `<button class="btn ghost sm" onclick="App.cancelReservation('${r.id}')">Annuler</button>`:''}
        </div>
      </div>`;
    }).join('') : `<div style="color:var(--text-dim);padding:6px 0">Aucun blocage ce jour.</div>`}
    <div style="margin-top:10px"><button class="btn" onclick="App.openNewReservation('${selDay}')">+ Bloquer du matériel</button></div>
  </div>` : `<div class="card" style="margin-top:14px;text-align:center;color:var(--text-dim)">Sélectionnez un jour dans le calendrier.</div>`}
  `;
}

        <div class="kpi"><div class="num" style="font-size:13px">${st.favori? esc(st.favori):'—'}</div><div class="lbl">Matériel favori</div></div>
      </div>
      ${c.observations? `<div class="section-title">Observations</div><div style="color:var(--text-dim);font-size:13px;margin-bottom:10px">${esc(c.observations)}</div>`:''}
      <div class="section-title">Historique des réservations</div>
      ${resas.length? resas.map(r=>`<div class="hist-item"><div class="d">${fmtDate(r.dateDebut)}</div><div style="flex:1">${r.lieu? esc(r.lieu)+' · ':''}${r.articleIds.length} article(s) ${money(r.montant)!=='—'?'· '+money(r.montant):''}</div>${reservationPill(r.statut)}</div>`).join('') : `<div style="color:var(--text-faint);font-size:12.5px">Aucune réservation encore.</div>`}
      <div class="row" style="margin-top:16px"><button class="btn danger" onclick="App.deleteClient('${c.id}')">Supprimer le client</button></div>
    `);
  }

  if(name==='users'){
    return modalWrap('Utilisateurs', `
      <div id="users-list" style="max-height:260px;overflow:auto;margin-bottom:14px">
        ${state.users.map(u=>`
          <div class="chip" style="cursor:pointer" onclick="App.setCurrentUser('${u.id}')">
            <span>${u.id===state.currentUserId?'✓ ':''}${esc(u.prenom+' '+u.nom)} <span style="color:var(--text-dim)">— ${esc(u.role)}</span></span>
            <div style="display:flex;gap:6px;align-items:center">
              <span class="pill ${u.actif?'green':'gray'}" onclick="event.stopPropagation(); App.toggleUserActif('${u.id}')">${u.actif?'Actif':'Inactif'}</span>
              <button class="close-x" style="width:24px;height:24px;font-size:13px" onclick="event.stopPropagation(); App.deleteUser('${u.id}')" title="Supprimer">✕</button>
            </div>
          </div>`).join('')}
      </div>
      <div class="section-title">Ajouter un utilisateur</div>
      <form onsubmit="App.createUser(event)">
        <div class="row">
          <div class="field"><label>Prénom</label><input name="prenom" required></div>
          <div class="field"><label>Nom</label><input name="nom" required></div>
        </div>
        <div class="row">
          <div class="field"><label>Email</label><input type="email" name="email"></div>
          <div class="field"><label>Téléphone</label><input name="telephone"></div>
        </div>
        <div class="field"><label>Rôle</label><select name="role"><option>Administrateur</option><option>Employé</option><option>Commercial</option></select></div>
        <button class="btn" type="submit" style="width:100%">Ajouter</button>
      </form>
    `);
  }

  if(name==='owners'){
    return modalWrap('Propriétaires du matériel', `
      <p style="color:var(--text-dim);font-size:12.5px;margin-top:0">Chaque matériel appartient à un propriétaire (votre société, un partenaire, un client qui dépose son matériel…).</p>
      <div style="max-height:260px;overflow:auto;margin-bottom:14px">
        ${state.proprietaires.map(o=>`
          <div class="chip">
            <span style="display:flex;align-items:center;gap:8px">
              <span style="width:10px;height:10px;border-radius:50%;background:${o.couleur};display:inline-block;flex-shrink:0"></span>
              ${esc(o.nom)}${o.societe&&o.societe!==o.nom? ' — '+esc(o.societe):''}
              <span style="color:var(--text-dim);font-size:11px">${state.catalog.articles.filter(a=>a.proprietaireId===o.id).length} article(s)</span>
            </span>
            <div style="display:flex;gap:6px;align-items:center">
              <span class="pill ${o.actif?'green':'gray'}" onclick="App.toggleOwnerActif('${o.id}')" style="cursor:pointer">${o.actif?'Actif':'Inactif'}</span>
              <button class="close-x" style="width:24px;height:24px;font-size:13px" onclick="App.deleteOwner('${o.id}')" title="Supprimer">✕</button>
            </div>
          </div>`).join('') || '<div style="color:var(--text-faint);font-size:12.5px">Aucun propriétaire encore.</div>'}
      </div>
      <div class="section-title">Ajouter un propriétaire</div>
      <form onsubmit="App.createOwner(event)">
        <div class="row">
          <div class="field"><label>Nom</label><input name="nom" required placeholder="Ex : PimpMusic"></div>
          <div class="field"><label>Société</label><input name="societe" placeholder="Optionnel si identique"></div>
        </div>
        <div class="row">
          <div class="field"><label>Téléphone</label><input name="telephone"></div>
          <div class="field"><label>Email</label><input type="email" name="email"></div>
        </div>
        <div class="field"><label>Adresse</label><input name="adresse"></div>
        <div class="field"><label>Couleur d'affichage</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${OWNER_COLORS.map((c,i)=>`<label style="cursor:pointer">
              <input type="radio" name="couleur" value="${c.hex}" ${i===0?'checked':''} style="display:none">
              <span class="owner-swatch" style="width:26px;height:26px;border-radius:50%;background:${c.hex};display:inline-block;border:2px solid transparent" onclick="this.previousElementSibling.checked=true; this.parentElement.parentElement.querySelectorAll('.owner-swatch').forEach(s=>s.style.borderColor='transparent'); this.style.borderColor='var(--text)';"></span>
            </label>`).join('')}
          </div>
        </div>
        <button class="btn" type="submit" style="width:100%">Ajouter le propriétaire</button>
      </form>
    `);
  }

  if(name==='reservationDetail'){
    const r=state.reservations.find(x=>x.id===payload.id);
    if(!r) return modalWrap('Réservation introuvable','');
    const arts=r.articleIds.map(id=>findArticle(id)).filter(Boolean);
    const groups={};
    arts.forEach(a=>{ const key=a.proprietaireId||'none'; if(!groups[key]) groups[key]=[]; groups[key].push(a); });
    const groupByNom={};
    Object.keys(groups).forEach(k=>{
      groupByNom[k]={};
      groups[k].forEach(a=>{ const key=a.nom; if(!groupByNom[k][key]) groupByNom[k][key]=0; groupByNom[k][key]++; });
    });
    return modalWrap(reservationLabel(r), `
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px">${reservationPill(r.statut)}<span style="color:var(--text-dim);font-size:12.5px">${fmtDate(r.dateDebut)} → ${fmtDate(r.dateFin)}</span></div>
      ${Object.keys(groupByNom).map(k=>{
        const o=k==='none'?null:findOwner(k);
        return `<div class="card" style="margin-bottom:10px">
          <div style="margin-bottom:6px">${ownerDot(o?o.id:null)}</div>
          ${Object.keys(groupByNom[k]).map(nom=>`<div style="font-size:13.5px;padding:3px 0">${esc(nom)} ×${groupByNom[k][nom]}</div>`).join('')}
        </div>`;
      }).join('')}
      ${r.notes? `<div class="section-title">Notes</div><div style="color:var(--text-dim);font-size:13px">${esc(r.notes)}</div>`:''}
      <div style="color:var(--text-faint);font-size:11.5px;margin-top:10px">Créé par ${esc(userLabel(r.creePar))}${r.montant? ' · '+money(r.montant):''}</div>
    `);
  }

  if(name==='confirmSortie'){
    const r=state.reservations.find(x=>x.id===payload.reservationId);
    return modalWrap('Confirmer la sortie', `
      <p style="color:var(--text-dim);font-size:13px;margin-top:0">Marquer les ${r?r.articleIds.length:0} article(s) comme partis pour <b>${r?esc(reservationLabel(r)):''}</b>, sous votre nom (${esc(userLabel(state.currentUserId))}).</p>
      <form onsubmit="App.confirmSortie(event)">
        <input type="hidden" name="reservationId" value="${payload.reservationId}">
        <div class="field"><label>Signature / nom du réceptionnaire (optionnel)</label><input name="signature" placeholder="Ex : signé par M. Dupont"></div>
        <div class="field"><label>Commentaire</label><textarea name="commentaire" rows="2"></textarea></div>
        <button class="btn" type="submit" style="width:100%">Confirmer la livraison</button>
      </form>
    `);
  }

  if(name==='confirmRetour'){
    const r=state.reservations.find(x=>x.id===payload.reservationId);
    const arts=(r?r.articleIds:[]).map(id=>findArticle(id)).filter(a=>a && a.sortieActuelleId);
    const groups={};
    arts.forEach(a=>{ const key=a.proprietaireId||'none'; if(!groups[key]) groups[key]=[]; groups[key].push(a); });
    return modalWrap('Confirmer le retour', `
      <p style="color:var(--text-dim);font-size:13px;margin-top:0">Cochez les articles effectivement revenus de <b>${r?esc(reservationLabel(r)):''}</b>. Décochez ce qui manque encore.</p>
      <form onsubmit="App.confirmRetour(event)" onchange="App.recalcRetourSummary(this)">
        <input type="hidden" name="reservationId" value="${payload.reservationId}">
        ${Object.keys(groups).map(k=>{
          const o=k==='none'?null:findOwner(k);
          return `<div class="card" style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              ${ownerDot(o?o.id:null)}
              <span class="owner-summary" data-owner="${k}" style="font-size:11.5px;font-weight:700;color:var(--green)">✔ Tout est revenu</span>
            </div>
            ${groups[k].map(a=>`
              <div class="retour-line" data-owner="${k}" style="display:flex;align-items:center;gap:8px;padding:5px 0">
                <input type="checkbox" value="${a.id}" checked style="width:auto">
                <span style="flex:1;font-size:13px">${esc(a.nom)} <span class="mono" style="color:var(--text-dim);font-size:11px">${esc(a.codeScan)}</span></span>
              </div>`).join('')}
          </div>`;
        }).join('') || '<div style="color:var(--text-faint);font-size:12.5px;margin-bottom:10px">Aucun article actuellement sorti pour cette réservation.</div>'}
        <div class="field"><label>Commentaire (dégâts, éléments manquants…)</label><textarea name="commentaire" rows="2" placeholder="Ex : il manque un câble XLR"></textarea></div>
        <button class="btn" type="submit" style="width:100%">Confirmer le retour</button>
      </form>
    `);
  }

  return '';
}
function modalWrap(title,body){
  return `<div class="modal-bg" onclick="if(event.target===this) App.closeModal()">
    <div class="modal">
      <div class="modal-head"><h3>${esc(title)}</h3><button class="close-x" onclick="App.closeModal()">✕</button></div>
      ${body}
    </div>
  </div>`;
}
App._findByCode = (code)=> findArticleByAnyCode(code||'');
App._findClientByLabel = (label)=>{ if(!label) return null; return state.clients.find(c=>clientLabel(c)===label); };

function pseudoBarcodeStrip(){
  let bars='',x=0;
  for(let i=0;i<160;i++){ const w=1+((i*7)%3); bars+=`<rect x="${x}" y="0" width="${w}" height="14"/>`; x+=w+2; }
  return `<svg viewBox="0 0 ${x} 14" width="100%" height="14" preserveAspectRatio="none" fill="var(--accent)">${bars}</svg>`;
}

function checkDeepLink(){
  const hash=(location.hash||'').replace('#','').trim();
  if(!/^PU\d{8}$/i.test(hash)) return;
  const a=findArticleByScan(hash);
  if(a){ state.page='stock'; App.openArticle(a.id); }
}

loadAll().then(()=>{ checkDeepLink(); });
